# Single-service deploy for Railway: one Docker image builds the Next.js UI to a
# static export and serves it plus the API from one FastAPI process.
#
# In the dashboard: set the GATEWAY_API_KEY secret, add a Volume mounted at
# /app/data, set ARBITER_DB=/app/data/arbiter.db, then generate a public domain
# (Settings -> Networking -> Generate Domain).

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
